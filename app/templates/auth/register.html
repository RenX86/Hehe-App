{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Register</h4>
            </div>
            <div class="card-body">
                <form method="POST" id="register-form">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="e.g., yourname@gmail.com"
                            required
                        >
                        <small class="text-muted">
                            Only @gmail.com, @protonmail.com, and @proton.me emails are accepted.
                        </small>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            required
                        >
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Email Domain Validation Script -->
<script>
    function validateEmailDomain(email) {
        const allowedDomains = ['gmail.com', 'protonmail.com', 'proton.me'];
        const emailDomain = email.split('@')[1];
        return allowedDomains.includes(emailDomain);
    }

    document.getElementById('register-form').addEventListener('submit', function(event) {
        const emailInput = document.getElementById('email');
        if (!validateEmailDomain(emailInput.value)) {
            event.preventDefault(); // Prevent submission
            alert('Please use a valid email from @gmail.com, @protonmail.com, or @proton.me');
        }
    });
</script>
{% endblock %}
